<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>

    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#0284C7" flood-opacity="0.25"/>
    </filter>

    <style>
      .bar {
        transform-box: fill-box;
        transform-origin: center;
        animation: pulse 1.2s infinite ease-in-out;
        fill: #FFFFFF;
      }
      .b1 { animation-delay: 0.0s; }
      .b2 { animation-delay: -0.2s; }
      .b3 { animation-delay: -0.4s; }
      .b4 { animation-delay: -0.6s; }
      .b5 { animation-delay: -0.8s; }

      @keyframes pulse {
        0%, 100% { transform: scaleY(1); }
        50% { transform: scaleY(0.4); }
      }

      .sparkle {
        transform-box: fill-box;
        transform-origin: center;
        animation: float 3s infinite ease-in-out;
        fill: #38BDF8;
      }
      .s1 { animation-delay: 0s; }
      .s2 { animation-delay: 1.5s; }

      @keyframes float {
        0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; }
        50% { transform: scale(0.85) rotate(15deg); opacity: 0.8; }
      }
    </style>
  </defs>

  <g transform="translate(-24, 56)">
    
    <path 
      d="M160,100 
         h180 a60,60 0 0,1 60,60 
         v80 a60,60 0 0,1 -60,60 
         h-100 l-70,80 l20,-80 h-30 
         a60,60 0 0,1 -60,-60 
         v-80 a60,60 0 0,1 60,-60 z" 
      fill="url(#bg-gradient)" 
      filter="url(#shadow)"
    />

    <rect x="180" y="175" width="20" height="50" rx="10" class="bar b1"/>
    <rect x="210" y="155" width="20" height="90" rx="10" class="bar b2"/>
    <rect x="240" y="140" width="20" height="120" rx="10" class="bar b3"/>
    <rect x="270" y="165" width="20" height="70" rx="10" class="bar b4"/>
    <rect x="300" y="180" width="20" height="40" rx="10" class="bar b5"/>

    <path 
      d="M400,40 C400,70 430,100 460,100 C430,100 400,130 400,160 C400,130 370,100 340,100 C370,100 400,70 400,40 Z" 
      class="sparkle s1"
    />

    <path 
      d="M450,130 C450,145 465,160 480,160 C465,160 450,175 450,190 C450,175 435,160 420,160 C435,160 450,145 450,130 Z" 
      class="sparkle s2"
    />

  </g>
</svg>